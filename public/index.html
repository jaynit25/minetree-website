/* Reset and body */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f9fafb;  /* very light background */
  color: #333;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: #ffffff;
  box-shadow: 0 2px 6px rgb(0 0 0 / 0.1);
  position: sticky;
  top: 0;
  z-index: 100;
}

.navbar h2 {
  color: #0f172a;
}

.navbar a {
  margin: 0 15px;
  color: #0f172a;
  font-weight: 600;
  text-decoration: none;
  transition: color 0.3s ease;
}

.navbar a:hover {
  color: #3b82f6;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 80px;
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  color: white;
}

.hero h1 {
  font-size: 3.5rem;
  margin-bottom: 0.3em;
  font-weight: 700;
}

.hero p {
  font-size: 1.3rem;
  margin-bottom: 0.6em;
  font-weight: 500;
}

.founder {
  font-size: 1rem;
  font-style: italic;
  color: #dbeafe;
  margin-bottom: 30px;
}

.hero-buttons button {
  margin: 0 10px;
  padding: 12px 28px;
  font-weight: 600;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: background 0.3s ease;
}

.primary {
  background: #2563eb;
  color: white;
  box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
}

.primary:hover {
  background: #1e40af;
  box-shadow: 0 8px 20px rgba(30, 64, 175, 0.6);
}

.secondary {
  background: transparent;
  color: #2563eb;
  border: 2px solid #2563eb;
}

.secondary:hover {
  background: #2563eb;
  color: white;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  text-align: center;
  max-width: 1100px;
  margin: 0 auto;
}

.section h2 {
  font-size: 2.5rem;
  margin-bottom: 1em;
  color: #0f172a;
  font-weight: 700;
}

/* SERVICES GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 30px;
  margin-top: 30px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 30px 20px;
  box-shadow: 0 4px 20px rgb(0 0 0 / 0.07);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: default;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 8px 30px rgb(0 0 0 / 0.12);
}

.icon {
  font-size: 48px;
  margin-bottom: 20px;
  color: #2563eb;
}

.card h3 {
  font-weight: 700;
  font-size: 1.3rem;
  color: #0f172a;
}

/* UI/UX SECTION */
.section.dark {
  background: #e0e7ff;
  color: #1e293b;
}

.section.dark h2 {
  color: #1e293b;
}

.section.dark p {
  font-size: 1.15rem;
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.6;
}

/* LEARN & CONTACT CONTAINER SIDE BY SIDE */
.learn-contact-wrapper {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  margin-top: 30px;
}

.course, 
.form {
  background: white;
  padding: 30px 25px;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgb(0 0 0 / 0.07);
  flex: 1 1 400px;
  max-width: 500px;
}

.course h3 {
  font-weight: 700;
  font-size: 1.6rem;
  margin-bottom: 15px;
  color: #2563eb;
}

.price {
  font-size: 2rem;
  font-weight: 800;
  color: #22c55e;
  margin-bottom: 15px;
}

.course ul {
  text-align: left;
  margin-left: 20px;
  margin-bottom: 25px;
  color: #475569;
  font-weight: 600;
  font-size: 1rem;
}

.course ul li {
  margin-bottom: 8px;
}

.course button {
  background: #2563eb;
  color: white;
  border-radius: 30px;
  padding: 12px 32px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: background 0.3s ease;
}

.course button:hover {
  background: #1e40af;
}

/* FORM */
.form input,
.form select,
.form textarea {
  width: 100%;
  margin-bottom: 15px;
  padding: 14px 15px;
  font-size: 1rem;
  border: 1.5px solid #cbd5e1;
  border-radius: 8px;
  transition: border-color 0.3s ease;
}

.form input:focus,
.form select:focus,
.form textarea:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 8px #2563ebaa;
}

.form textarea {
  min-height: 100px;
  resize: vertical;
}

.form button {
  background: #2563eb;
  color: white;
  padding: 14px 0;
  border-radius: 30px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.3s ease;
  margin-top: 10px;
}

.form button:hover {
  background: #1e40af;
}

/* FOOTER */
footer {
  padding: 25px 20px;
  text-align: center;
  background: #2563eb;
  color: white;
  font-weight: 600;
  font-size: 1rem;
}
